<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // SPA redirect for custom domain — preserves path via query string
      var seg = window.location.pathname;
      var query = seg && seg !== '/' ? '?p=' + seg.slice(1) : '';
      window.location.replace(window.location.origin + '/' + query);
    </script>
  </head>
  <body></body>
</html>
